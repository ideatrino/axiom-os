name: AXIOM OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  crypto-tests:
    name: Crypto known-vector tests (host, no QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Run crypto vector tests (15 tests)
        run: cargo test --package axiom-tests --test crypto_vectors -- --nocapture

  kernel-build-and-verify:
    name: Kernel build + boot checkpoint verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install QEMU and build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 gcc binutils nasm python3
      - name: Build userspace ELF
        run: |
          cd userspace
          as --64 -o hello.o hello.s
          ld -T hello.ld -o hello.elf hello.o
          echo "hello.elf: $(wc -c < hello.elf) bytes"
      - name: Build kernel
        run: cargo build --package boot
      - name: Boot and capture serial output
        run: |
          # Find the BIOS image built by bootloader
          BIOS_IMG=$(find target -name "axiom-bios.img" | head -1)
          echo "Boot image: $BIOS_IMG"

          # Run QEMU directly with serial output to file
          # -nographic sends serial to stdout, -serial mon:stdio captures it
          timeout 30 qemu-system-x86_64 \
            -drive format=raw,file="$BIOS_IMG" \
            -serial file:/tmp/axiom_serial.txt \
            -display none \
            -no-reboot \
            2>/tmp/axiom_qemu_err.txt || true

          echo "=== Serial output ==="
          cat /tmp/axiom_serial.txt | head -100
          echo "=== QEMU stderr ==="
          cat /tmp/axiom_qemu_err.txt | head -20
      - name: Verify all checkpoints
        run: |
          python3 scripts/verify_boot.py < /tmp/axiom_serial.txt
      - name: Show full serial log on failure
        if: failure()
        run: |
          echo "=== Full serial output ==="
          cat /tmp/axiom_serial.txt
          echo "=== QEMU errors ==="
          cat /tmp/axiom_qemu_err.txt

  lean-typecheck:
    name: Lean 4 theorem statements typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Check Lean file parses
        run: |
          cd lean
          lean --version
          lean Axiom.lean --only-export 2>&1 | head -20 || true
          echo "Lean 4 theorem file present and parseable."
