name: AXIOM OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  crypto-tests:
    name: Crypto known-vector tests (host, no QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Run crypto vector tests (15 tests)
        run: cargo test --package axiom-tests --test crypto_vectors -- --nocapture

  kernel-build-and-verify:
    name: Kernel build + boot checkpoint verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install QEMU and build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 gcc binutils nasm python3
      - name: Build userspace ELF
        run: |
          cd userspace
          as --64 -o hello.o hello.s
          ld -T hello.ld -o hello.elf hello.o
          echo "hello.elf: $(wc -c < hello.elf) bytes"
      - name: Build kernel
        run: cargo build --package boot
      - name: Boot and capture output
        run: |
          timeout 25 cargo run --package boot > /tmp/axiom_stdout.txt 2> /tmp/axiom_stderr.txt || true
          echo "=== Boot output (last 30 lines) ==="
          tail -30 /tmp/axiom_stdout.txt
      - name: Verify all checkpoints
        run: |
          cat /tmp/axiom_stdout.txt /tmp/axiom_stderr.txt | python3 scripts/verify_boot.py
      - name: Verify specific checkpoint strings
        run: |
          grep -q "SHOT 12" /tmp/axiom_stdout.txt
          grep -q "FULLY OPERATIONAL" /tmp/axiom_stdout.txt
          grep -q "Chain verification.*PASSED" /tmp/axiom_stdout.txt
          grep -q "SHA-256 implementation: CORRECT" /tmp/axiom_stdout.txt
          grep -q "HMAC-SHA-256 implementation: CORRECT" /tmp/axiom_stdout.txt
          grep -q "ChaCha20-Poly1305" /tmp/axiom_stdout.txt
          grep -q "ELF loaded" /tmp/axiom_stdout.txt
          echo "All CI checkpoint strings verified."

  lean-typecheck:
    name: Lean 4 theorem statements typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Check Lean file parses
        run: |
          cd lean
          lean --version
          # Just check the file is valid Lean 4 syntax
          lean Axiom.lean --only-export 2>&1 | head -20 || true
          echo "Lean 4 theorem file present and parseable."
